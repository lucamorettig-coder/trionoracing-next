<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Recupero password · Portale Triono Racing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
.auth-page { min-height: 100%; display: flex; flex-direction: column; background: var(--bg-soft); }
.auth-top {
  background: #fff;
  border-bottom: 1px solid var(--line);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.auth-top-back {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--ink-muted); font-size: 13px; font-weight: 500;
  text-decoration: none;
}
.auth-top-logo { display: flex; align-items: center; gap: 8px; }
.auth-top-logo .mark {
  width: 30px; height: 30px;
  background: var(--navy-700); color: #fff;
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px;
}
.auth-top-logo .name { font-weight: 700; font-size: 14px; color: var(--ink); }

.recover-wrap {
  flex: 1;
  padding: 24px 16px 40px;
  display: flex; flex-direction: column; gap: 18px;
}

.recover-step-card {
  max-width: 540px;
  margin: 0 auto;
  width: 100%;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 24px 20px;
  box-shadow: var(--sh-sm);
  position: relative;
}
.recover-step-card.active { border-color: var(--navy-700); border-width: 2px; padding: 23px 19px; }
.recover-step-card.completed { background: var(--grass-50); border-color: var(--grass-100); }

.recover-step-label {
  position: absolute;
  top: -12px; left: 18px;
  background: var(--navy-700); color: #fff;
  font-family: var(--f-mono); font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 999px;
  display: inline-flex; align-items: center; gap: 6px;
}
.recover-step-card.completed .recover-step-label { background: var(--grass-500); }
.recover-step-card.upcoming .recover-step-label { background: var(--bg-muted); color: var(--ink-muted); border: 1px solid var(--line); }

.recover-step-h {
  font-size: 22px; font-weight: 700; letter-spacing: -0.015em;
  color: var(--ink); margin: 12px 0 8px; line-height: 1.2;
}
.recover-step-card.upcoming .recover-step-h { color: var(--ink-muted); }
.recover-step-sub {
  font-size: 14px; color: var(--ink-muted); line-height: 1.55; margin: 0 0 18px;
}
.recover-step-sub strong { color: var(--ink); }

.field-with-icon { position: relative; }
.field-with-icon .field { padding-left: 42px; }
.field-with-icon .ico {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--ink-muted); pointer-events: none;
}

.success-row {
  display: flex; gap: 12px; align-items: center;
  padding: 14px;
  background: #fff;
  border: 1px solid var(--grass-100);
  border-radius: var(--r-md);
  margin-bottom: 16px;
}
.success-row .ico {
  width: 36px; height: 36px;
  background: var(--grass-500); color: #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.success-row .body { flex: 1; }
.success-row .t1 { font-size: 14px; font-weight: 600; color: var(--ink); }
.success-row .t2 { font-size: 12.5px; color: var(--ink-muted); margin-top: 2px; line-height: 1.4; }

.code-input-row {
  display: flex; gap: 8px;
  margin-bottom: 12px;
}
.code-input-row input {
  flex: 1;
  width: 100%;
  font-family: var(--f-mono);
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  padding: 14px 0;
  border: 1.5px solid var(--line);
  border-radius: var(--r-md);
  background: #fff;
  color: var(--ink);
  letter-spacing: 0.02em;
  outline: none;
}
.code-input-row input:focus { border-color: var(--navy-700); }
.code-input-row input.filled { border-color: var(--navy-700); background: var(--navy-50); color: var(--navy-900); }

.resend-row {
  font-size: 12.5px; color: var(--ink-muted);
  text-align: center;
  margin-top: 14px;
}
.resend-row a { color: var(--sky-600); font-weight: 600; text-decoration: none; }
.resend-row .timer { font-family: var(--f-mono); color: var(--ink); }

.pwd-rules {
  margin-top: 6px;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 4px 12px;
  font-size: 11.5px; color: var(--ink-muted);
  font-family: var(--f-mono);
}
.pwd-rule { display: flex; align-items: center; gap: 5px; }
.pwd-rule.ok { color: var(--grass-700); }
.pwd-rule i { width: 11px; height: 11px; flex-shrink: 0; }

.step-actions {
  margin-top: 16px;
  display: flex; gap: 10px;
}
.step-actions .btn-block { flex: 1; }

.muted-card {
  max-width: 540px;
  margin: 0 auto;
  width: 100%;
  text-align: center;
  padding: 20px;
  font-size: 13px;
  color: var(--ink-muted);
}
.muted-card a { color: var(--sky-600); font-weight: 600; text-decoration: none; }

@container page (min-width: 900px) {
  .auth-top { padding: 18px 40px; }
  .recover-wrap { padding: 48px 20px; gap: 24px; }
  .recover-step-card { padding: 32px; max-width: 580px; }
  .recover-step-card.active { padding: 31px; }
  .recover-step-h { font-size: 26px; }
}
</style>
</head>
<body>

<div id="mount"></div>

<template id="page-content">
<div class="auth-page">

  <!-- Top bar -->
  <div class="auth-top">
    <a href="login.html" class="auth-top-back">
      <i data-lucide="arrow-left" style="width:16px;height:16px"></i>
      Torna al login
    </a>
    <div class="auth-top-logo">
      <div class="mark">T</div>
      <div class="name">Triono Racing</div>
    </div>
  </div>

  <div class="recover-wrap">

    <!-- =============================================
         STEP 1 — COMPLETED (email inviata)
         ============================================= -->
    <div class="recover-step-card completed">
      <span class="recover-step-label">
        <i data-lucide="check" style="width:11px;height:11px"></i>
        Step 1 · completato
      </span>
      <h2 class="recover-step-h">Richiedi il recupero</h2>
      <p class="recover-step-sub">
        Hai inserito <strong>luca.rossi@email.it</strong>. Abbiamo inviato un codice a 6 cifre alla tua casella.
      </p>
    </div>

    <!-- =============================================
         STEP 2 — ACTIVE (inserisci codice)
         ============================================= -->
    <div class="recover-step-card active">
      <span class="recover-step-label">Step 2 · in corso</span>
      <h2 class="recover-step-h">Inserisci il codice ricevuto</h2>

      <div class="success-row">
        <div class="ico"><i data-lucide="mail-check" style="width:18px;height:18px"></i></div>
        <div class="body">
          <div class="t1">Email inviata a luca.rossi@email.it</div>
          <div class="t2">Controlla la casella (anche spam/promozioni). Il codice scade tra 15 minuti.</div>
        </div>
      </div>

      <label class="label">Codice di verifica</label>
      <div class="code-input-row">
        <input type="text" maxlength="1" value="3" class="filled" inputmode="numeric" aria-label="Cifra 1" />
        <input type="text" maxlength="1" value="7" class="filled" inputmode="numeric" aria-label="Cifra 2" />
        <input type="text" maxlength="1" value="2" class="filled" inputmode="numeric" aria-label="Cifra 3" />
        <input type="text" maxlength="1" value="8" class="filled" inputmode="numeric" aria-label="Cifra 4" />
        <input type="text" maxlength="1" value="9" class="filled" inputmode="numeric" aria-label="Cifra 5" />
        <input type="text" maxlength="1" placeholder="_" inputmode="numeric" aria-label="Cifra 6" />
      </div>
      <p class="helper">Hai 1 cifra da inserire. Il codice si auto-verifica al sesto carattere.</p>

      <div class="step-actions">
        <button class="btn btn-primary btn-block btn-lg">
          Verifica codice
          <i data-lucide="arrow-right" style="width:18px;height:18px"></i>
        </button>
      </div>

      <div class="resend-row">
        Non hai ricevuto l'email? <a href="#">Reinvia codice</a> tra <span class="timer">00:42</span>
      </div>
    </div>

    <!-- =============================================
         STEP 3 — UPCOMING (nuova password)
         ============================================= -->
    <div class="recover-step-card upcoming">
      <span class="recover-step-label">Step 3 · in arrivo</span>
      <h2 class="recover-step-h">Scegli una nuova password</h2>
      <p class="recover-step-sub">
        Dopo aver verificato il codice, sceglierai una nuova password. Le regole sono le stesse della registrazione (min. 8 caratteri, 1 maiuscola, 1 numero, 1 carattere speciale).
      </p>
      <div style="opacity:0.55;pointer-events:none">
        <label class="label">Nuova password</label>
        <div class="field-with-icon">
          <span class="ico"><i data-lucide="lock" style="width:18px;height:18px"></i></span>
          <input type="password" class="field" placeholder="••••••••" disabled />
        </div>
        <div class="pwd-rules" style="margin-bottom:14px">
          <div class="pwd-rule"><i data-lucide="circle" style="width:11px;height:11px"></i>Almeno 8 caratteri</div>
          <div class="pwd-rule"><i data-lucide="circle" style="width:11px;height:11px"></i>Una maiuscola</div>
          <div class="pwd-rule"><i data-lucide="circle" style="width:11px;height:11px"></i>Un numero</div>
          <div class="pwd-rule"><i data-lucide="circle" style="width:11px;height:11px"></i>Un carattere speciale</div>
        </div>
        <button class="btn btn-primary btn-block btn-lg" disabled>Aggiorna password e accedi</button>
      </div>
    </div>

    <!-- Bottom help -->
    <div class="muted-card">
      Continui a non ricevere l'email? <a href="#">Contatta la segreteria</a> e ti aiuteremo a sbloccare il tuo account.
    </div>

  </div>

</div>
</template>

<script src="../shared/page-shell.js"></script>
<script>
  mountMockup({
    crumb: ['Mockup Portale', 'Auth', 'Recupero password'],
    title: 'Recupero password',
    route: '/portale/recupero-password',
    statusBarTheme: 'light',
    desktopScale: 0.62,
    stateLegend: {
      tag: 'Tutti gli step visibili',
      items: [
        { ref: 1, text: 'Step 1 completato (email inserita), Step 2 attivo (5/6 cifre inserite), Step 3 disabled' }
      ]
    },
    annotations: [
      { ref: 1, text: '<strong>3 step su una pagina</strong> · in produzione il flow Clerk avanza con transizione fade (step precedente sparisce, attivo entra). Qui li mostriamo tutti per documentare i 3 stati: <span style="color:var(--grass-700)">completed</span>, <span style="color:var(--navy-700)">active</span>, <span style="color:var(--ink-muted)">upcoming</span>.' },
      { ref: 2, text: '<strong>Codice 6 cifre</strong> con auto-advance: ogni cifra avanza al campo successivo, paste di "372890" riempie tutti i 6 input. Submit auto al 6° carattere. Errore (codice sbagliato): bordi flag-500 + helper «Codice non corretto. <a>Reinvia</a>».' },
      { ref: 3, text: '<strong>Magic link alternativo</strong> (non mostrato): il pulsante «Reinvia codice» offre anche l\'opzione «Invia un magic link» — l\'email contiene un link che salta lo step 2.' },
      { ref: 4, text: '<strong>Timer reinvio</strong>: 60 secondi countdown prima di poter chiedere un nuovo codice. Previene abuse della tua API email. Una volta a 0 il link diventa cliccabile.' },
      { ref: 5, text: '<strong>Email sicurezza</strong>: l\'email inviata è la stessa <code>passwordReset</code> di Clerk, customizzata col template Triono (logo + colori). Soggetto: «Triono Racing · codice di recupero password 372890».' },
      { ref: 6, text: '<strong>Fallback contatto</strong>: link a «Contatta la segreteria» in fondo — per casi limite (email cambiata, accesso perso). Apre mailto: con subject pre-compilato.' },
      { ref: 7, text: '<strong>Top bar minimale</strong>: solo logo + back to login. Niente NavBar full perché l\'utente non è autenticato.' }
    ]
  });
  setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 50);
</script>

</body>
</html>
