<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EVO-016 · Admin Infra & DS scaffold — visual reference</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="evo-016/styles.css">

<style>
  /* Hide page-shell defaults we don't need here */
  html, body { background: #f0eee9; }
  body { margin: 0; }
  code { font-family: var(--f-mono); font-size: 0.95em; background: rgba(0,0,0,.06); padding: 1px 4px; border-radius: 3px; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body>
  <div id="root"></div>

  <!-- Design canvas + visuals -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="evo-016/icons.jsx"></script>
  <script type="text/babel" src="evo-016/dashboard-full.jsx"></script>
  <script type="text/babel" src="evo-016/ds-primitives.jsx"></script>
  <script type="text/babel" src="evo-016/datatable-demo.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useEffect } = React;

    function EVO016Canvas() {
      useEffect(() => { document.title = 'EVO-016 · Admin Infra & DS scaffold'; }, []);
      return (
        <DesignCanvas projectTitle="EVO-016 · Admin Infra & DS scaffold">
          <DCSection id="dashboard" title="A-1 · Dashboard admin" subtitle="Atterraggio admin · KPI essenziali + Today's tasks + Quick actions">
            <DCArtboard id="full"  label="① Stato pieno"  width={1440} height={1180}>
              <DashboardFull taskState="full" />
            </DCArtboard>
            <DCArtboard id="empty" label="② Empty state"  width={1440} height={1180}>
              <DashboardFull taskState="empty" />
            </DCArtboard>
          </DCSection>

          <DCSection id="primitives" title="DS primitivi · Radix overlays" subtitle="Riferimento per Claude Code · Dialog · AlertDialog · DropdownMenu">
            <DCArtboard id="overlays" label="③ Dialog · AlertDialog · DropdownMenu" width={1640} height={920}>
              <DSPrimitives />
            </DCArtboard>
          </DCSection>

          <DCSection id="datatable" title="A-2 · DataTable demo" subtitle="Pattern di riferimento · desktop + fallback mobile">
            <DCArtboard id="composite" label="④ DataTable + AdminFilters + BulkActionBar" width={1900} height={1480}>
              <DataTableComposite />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<EVO016Canvas />);
  </script>
</body>
</html>
