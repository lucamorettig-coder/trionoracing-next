<style>
.adm-bamb-head { background: #fff; border-bottom: 1px solid var(--line); padding: 18px 16px; }
.adm-bamb-top { display: flex; gap: 14px; align-items: flex-start; }
.adm-bamb-photo { width: 64px; height: 64px; border-radius: var(--r-lg); flex-shrink: 0; font-size: 9px; }
.adm-bamb-body { flex: 1; min-width: 0; }
.adm-bamb-eyebrow { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-muted); }
.adm-bamb-name { font-size: 22px; font-weight: 700; letter-spacing: -0.015em; margin: 2px 0; }
.adm-bamb-meta { font-size: 12.5px; color: var(--ink-muted); display: flex; gap: 4px 10px; flex-wrap: wrap; }
.adm-bamb-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

.gen-panel { background: var(--sky-50); border: 1px solid var(--sky-100); border-left: 3px solid var(--sky-500); border-radius: var(--r-md); padding: 12px 14px; margin-top: 12px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.gen-panel-l { display: flex; align-items: center; gap: 10px; }
.gen-panel .ico-circ { width: 32px; height: 32px; border-radius: 50%; background: var(--sky-100); color: var(--sky-700); display: flex; align-items: center; justify-content: center; }
.gen-panel-title { font-size: 12px; color: var(--ink-muted); }
.gen-panel-name { font-size: 14px; font-weight: 700; color: var(--ink); }
.gen-panel-actions { display: flex; gap: 6px; }
.gen-panel-actions a { color: var(--sky-700); text-decoration: none; font-size: 13px; font-weight: 600; padding: 6px 10px; border-radius: var(--r-sm); display: inline-flex; align-items: center; gap: 4px; }
.gen-panel-actions a:hover { background: var(--sky-100); }

.adm-tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--line); margin: 16px -16px 0; padding: 0 16px; }
.adm-tabs::-webkit-scrollbar { display: none; }
.adm-tab { display: inline-flex; align-items: center; gap: 6px; padding: 12px 14px; font-size: 13.5px; font-weight: 600; color: var(--ink-muted); background: transparent; border: none; border-bottom: 2.5px solid transparent; cursor: pointer; white-space: nowrap; text-decoration: none; }
.adm-tab.active { color: var(--navy-700); border-bottom-color: var(--navy-700); }
.adm-tab.tab-new::after { content: 'admin'; font-family: var(--f-mono); font-size: 9px; padding: 1px 4px; background: var(--ember-100); color: var(--ember-700); border-radius: 3px; font-weight: 700; margin-left: 4px; }
.adm-tab .count { font-family: var(--f-mono); font-size: 10px; padding: 1px 5px; background: var(--bg-muted); border-radius: 4px; color: var(--ink-muted); font-weight: 700; }
.adm-tab.active .count { background: var(--navy-100); color: var(--navy-700); }

.adm-card { background: #fff; border: 1px solid var(--line); border-radius: var(--r-xl); padding: 18px 20px; margin-bottom: 12px; }
.adm-card h3 { font-size: 14px; font-weight: 700; margin: 0 0 12px; display: flex; align-items: center; gap: 6px; }

.story-list { display: flex; flex-direction: column; }
.story-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line-soft); align-items: center; }
.story-row:last-child { border-bottom: none; }
.story-year { font-family: var(--f-mono); font-size: 11px; font-weight: 700; color: var(--navy-700); width: 56px; flex-shrink: 0; }
.story-main { flex: 1; min-width: 0; }
.story-title { font-size: 13.5px; font-weight: 600; color: var(--ink); }
.story-sub { font-size: 11.5px; color: var(--ink-muted); margin-top: 1px; }
.story-status { font-size: 11.5px; flex-shrink: 0; }
.story-action a { font-size: 12px; color: var(--sky-600); text-decoration: none; font-weight: 600; }

.lesson-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line-soft); align-items: flex-start; }
.lesson-row:last-child { border-bottom: none; }
.lesson-date { font-family: var(--f-mono); font-size: 11px; font-weight: 600; color: var(--ink-muted); width: 78px; flex-shrink: 0; padding-top: 2px; }
.lesson-body { flex: 1; min-width: 0; }
.lesson-tipo { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 1px 6px; border-radius: 3px; margin-right: 6px; }
.lesson-tipo.mtb { background: var(--grass-100); color: var(--grass-700); }
.lesson-tipo.bdc { background: var(--sky-100); color: var(--sky-700); }

.lesson-meta { font-size: 11.5px; color: var(--ink-muted); margin-top: 2px; }
.lesson-note { font-size: 12px; color: var(--ink); margin-top: 4px; padding: 6px 8px; background: var(--bg-soft); border-radius: var(--r-sm); border-left: 2px solid var(--navy-200); }
.lesson-note-internal { background: var(--ember-50); border-left-color: var(--ember-500); }
.lesson-note-internal::before { content: 'INT '; font-family: var(--f-mono); font-size: 9px; font-weight: 700; color: var(--ember-700); margin-right: 4px; }

.danger-zone { background: var(--flag-50); border: 1px solid var(--flag-100); border-radius: var(--r-xl); padding: 16px 18px; margin-top: 20px; }
.danger-zone h3 { font-size: 13px; font-weight: 700; color: var(--flag-700); display: flex; align-items: center; gap: 6px; margin: 0 0 6px; }
.danger-zone p { font-size: 12.5px; color: var(--ink); margin: 0 0 12px; line-height: 1.5; }
.danger-zone .reason { font-size: 11.5px; color: var(--flag-700); font-style: italic; margin-top: 8px; }
