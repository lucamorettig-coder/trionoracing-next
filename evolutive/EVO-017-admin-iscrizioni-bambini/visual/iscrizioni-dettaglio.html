.adm-pane-sub { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }

<script>

    title: 'Iscrizione admin · 5 tab',
    route: '/portale/admin/iscrizioni/[id]',
    statusBarTheme: 'dark',

    stateLegend: { tag: 'Stato', items: [{ ref: 1, text: 'Tab Stato+Override + Tab Storia entrambi espansi · 4/5 step · 12 eventi log · nota admin compilata' }] },
    annotations: [
      { ref: 1, text: '<strong>Header denso admin</strong>: foto + nome + ID iscrizione + meta + 4 info-card (Stato, Importo, Pagato, Disciplina). Più dati di colpo d\'occhio vs vista genitore.' },

      { ref: 3, text: '<strong>Checklist compatta</strong>: stesso pattern timeline del genitore. Step done in grass, warn (regolamento) in ember. Admin vede tutti gli step + audit info (IP, data).' },
      { ref: 4, text: '<strong>Override card ember</strong>: 4 azioni straordinarie · Forza completata (grass), Carica regolamento per il genitore (sky), Sollecito manuale (ember), Annulla iscrizione (flag destructive). Ogni override viene loggato.' },

      { ref: 9, text: '<strong>Annulla iscrizione</strong> (UX decision §5): soft-delete con conferma + motivo. Pagamenti già fatti restano registrati. Microcopy modal: «Eventuali rimborsi vanno gestiti manualmente da SumUp Dashboard o bonifico.»' }
    ]
  });
  setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 50);
</script>
