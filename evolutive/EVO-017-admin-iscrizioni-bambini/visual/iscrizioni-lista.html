<script>
  mountMockup({
    crumb: ['Mockup Portale', 'Admin', 'Iscrizioni'],
    title: 'Iscrizioni · tabella admin',
    route: '/portale/admin/iscrizioni',
    statusBarTheme: 'dark',
    desktopScale: 0.58,
    stateLegend: { tag: 'Stato', items: [{ ref: 1, text: 'Filtri 2026 attivi · 3 righe selezionate · bulk bar visibile · 1 rata scaduta highlighted' }] },
    annotations: [
      { ref: 1, text: '<strong>KPI strip top</strong> (5 card): totale anno + breakdown stati (attive grass, in completam. ember, bozze, annullate flag). Card cliccabili filtrano la tabella.' },
      { ref: 2, text: '<strong>Filtri sticky</strong> sopra la tabella: anno + stato + disciplina + modulistica + search bambino/genitore + counter mono. Pillole attive navy-50 con X per rimuovere.' },
      { ref: 3, text: '<strong>Bulk bar navy-700</strong> (compare con righe selezionate): count pillola sun + 4 azioni (sollecito, marca attive, esporta, annulla danger) + close X. Stesso pattern in bambini, pagamenti, genitori.' },
      { ref: 4, text: '<strong>Status icons compatti</strong>: 4 cerchi mini per Privacy · Regolamento · Taglie · 1ª rata. Grass ✓ (fatto), ember ⋯ (pending), flag ✗ (bloccato), grigio · (non applicabile). Permette di vedere stato modulistica a colpo d\'occhio senza colonna larga.' },
      { ref: 5, text: '<strong>Row highlight per urgenza</strong>: bg flag-50 per rata scaduta (vedi Sofia), bg ember-50 per warning, bg navy-50 per selected. Annullate (Edoardo) con opacity 0.55.' },
      { ref: 6, text: '<strong>Mobile fallback</strong>: tabella diventa horizontal-scrollable a 700px min-width. Su 375px viewport il container scorre orizzontalmente. Pattern accettabile per power-user admin (non genitori).' },
      { ref: 7, text: '<strong>Action menu per riga</strong>: bottone «...» apre dropdown con Apri / Forza completa / Marca chiusa / Annulla (azione contestuale per stato). Modal di conferma per azioni destructive.' },
      { ref: 8, text: '<strong>Cell-person component</strong>: foto-ph + nome + meta mono (cat · età). Pattern condiviso in tutte le tabelle admin che hanno bambino in colonna.' },
      { ref: 9, text: '<strong>Paginazione</strong>: «Riga 1-8 di 47 · 50 per pagina» + numeri pagina mono. Su dataset grandi (>200 righe) aggiungere "vai a pagina N" inline.' }
    ]
  });
  setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 50);
</script>
