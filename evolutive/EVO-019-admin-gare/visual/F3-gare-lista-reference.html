<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gare · Admin · Triono Racing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
.adm-gara-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
@container page (min-width: 720px) { .adm-gara-grid { grid-template-columns: 1fr 1fr; } }
@container page (min-width: 1100px) { .adm-gara-grid { grid-template-columns: repeat(3, 1fr); } }

.gara-card {
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r-xl);
  overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: var(--sh-sm);
  position: relative;
}
.gara-card.featured { border-color: var(--sun-500); border-width: 2px; }
.gara-card.draft { border-style: dashed; opacity: 0.85; }

.gara-card-img {
  height: 100px;
  position: relative;
  overflow: hidden;
}
.gara-card-img-ph {
  background-color: var(--navy-800);
  background-image: url('../assets/pattern.svg');
  background-size: 160px 160px;
  background-repeat: repeat;
  height: 100%;
}
.gara-card-img .featured-badge {
  position: absolute; top: 10px; left: 10px;
  background: var(--sun-500); color: var(--navy-900);
  font-family: var(--f-mono); font-size: 10px; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 4px 8px;
  border-radius: 4px;
  display: inline-flex; align-items: center; gap: 4px;
}
.gara-card-img .date-overlay {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(255,255,255,0.92);
  color: var(--navy-900);
  padding: 6px 10px;
  border-radius: 8px;
  text-align: center;
  font-family: var(--f-mono);
  line-height: 1.1;
}
.gara-card-img .date-overlay .d { font-size: 18px; font-weight: 800; }
.gara-card-img .date-overlay .m { font-size: 10px; opacity: 0.7; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 700; }

.gara-card-body { padding: 14px 16px; flex: 1; }
.gara-card-title {
  font-size: 15px; font-weight: 700;
  color: var(--ink); letter-spacing: -0.005em;
  margin: 0 0 4px; line-height: 1.25;
}
.gara-card-meta {
  font-size: 12px; color: var(--ink-muted);
  display: flex; flex-wrap: wrap; gap: 4px 8px;
  align-items: center;
}
.gara-card-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--line-soft);
}
.gara-card-stat { font-size: 11px; color: var(--ink-muted); }
.gara-card-stat strong { font-size: 16px; color: var(--ink); display: block; font-weight: 700; font-variant-numeric: tabular-nums; }
.gara-card-stat.warn strong { color: var(--ember-600); }
.gara-card-foot {
  padding: 10px 14px;
  background: var(--bg-soft);
  border-top: 1px solid var(--line-soft);
  display: flex; gap: 6px; align-items: center;
}
.gara-card-foot .maestri {
  flex: 1; font-size: 11px; color: var(--ink-muted);
  display: flex; align-items: center; gap: 4px;
}
.gara-card-foot .avatar { width: 22px; height: 22px; font-size: 9px; border: 1.5px solid #fff; }
</style>
</head>

<script src="../shared/page-shell.js"></script>
<script>
  mountMockup({
    crumb: ['Mockup Portale', 'Admin', 'Gare'],
    title: 'Gare · CRUD admin',
    route: '/portale/admin/gare',
    statusBarTheme: 'dark',
    desktopScale: 0.58,
    stateLegend: { tag: 'Stato', items: [{ ref: 1, text: 'Future selezionate · 5 gare visibili (1 featured scuola + 1 maestri da assegnare + 1 bozza)' }] },
    annotations: [
      { ref: 1, text: '<strong>Layout card grid 3-col</strong> (vs tabella delle altre admin): le gare hanno copertina visiva e sono poche, le card sono più narrative. Pattern coerente con vetrina genitore.' },
      { ref: 2, text: '<strong>Toggle Future/Passate/Bozze</strong>: segmented control top-right. Le bozze sono visibili solo all\'admin (non pubblicate ai genitori).' },
      { ref: 3, text: '<strong>Featured badge sun</strong>: stella + label «In evidenza · scuola». Si applica via toggle nel form gara. Solo gare scuola Triono — visibilità top in calendario genitore.' },
      { ref: 4, text: '<strong>Card foot CRUD inline</strong>: 3 azioni per riga · users (apri iscrizioni) · edit (modifica gara) · more-horizontal (menu: delete, duplica, esporta). Pattern compact.' },
      { ref: 5, text: '<strong>Maestri da assegnare</strong> warning ember: card del Gran Premio Narni mostra alert se ancora nessun maestro assegnato come accompagnatore. Action user-plus per assign rapido.' },
      { ref: 6, text: '<strong>Bozza state</strong>: opacity ridotta + border dashed + badge «BOZZA». Action send pubblica al genitore. Permette pre-pianificazione lungo termine.' },
      { ref: 7, text: '<strong>Card "Aggiungi gara"</strong>: empty-slot dashed con icon plus. Apre form modal/page completo (nome, data, orario, luogo, descrizione, immagine, categorie, costo, apertura/chiusura iscriz, flag evidenza).' },
      { ref: 8, text: '<strong>Stats inline</strong>: iscrizioni confermate + pending. Click sulla card apre la pagina /gare/[id]/iscrizioni con workflow approvazione.' }
    ]
  });
  setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 50);
</script>
