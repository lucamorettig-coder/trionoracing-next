<script>
  mountMockup({

    statusBarTheme: 'dark',
    desktopScale: 0.58,
    stateLegend: { tag: 'Stato', items: [{ ref: 1, text: 'Tutti gli account · 1 invito pending · 1 genitore senza figli (onboarding incompleto)' }] },
    annotations: [
      { ref: 1, text: '<strong>KPI breakdown ruoli</strong>: totale + genitori + maestri + admin + warn «senza figli» (onboarding incompleto, candidato follow-up).' },
      { ref: 2, text: '<strong>Avatar color-coded per ruolo</strong>: navy genitore · ember maestro · sun admin (matching Today\'s tasks dashboard). Multi-ruolo (Andrea Mancini = genitore + maestro) mostra colori multipli o l\'avatar primario.' },
      { ref: 3, text: '<strong>Badge ruolo plurale</strong> in colonna Ruolo: se utente ha più cappelli, mostra 2-3 badge stacked. Pattern dual-role come da UX_REDESIGN §4.2.' },
      { ref: 4, text: '<strong>Invito pending row</strong>: ember warn + meta sotto nome «Invito pending · 15 mag» + action send (reinvia). Pattern condiviso col flusso doppio genitore (figli-dettaglio tab Anagrafica).' },
      { ref: 5, text: '<strong>«Registrato senza figli»</strong> row: ember warn + flag in colonna Figli (0 in ember-700) + action mail (contatta). Connesso al Today\'s tasks della dashboard.' },
      { ref: 6, text: '<strong>Cambio ruolo</strong> (UX decision §6): action settings per riga apre modal «Cambia ruolo di {NOME}» con select + AlertDialog conferma. Audit logged.' },
      { ref: 7, text: '<strong>Soft-disable account</strong>: action menu «Disabilita» (con conferma) preserva storia ma blocca login. NO hard delete: GDPR / fiscale.' },
      { ref: 8, text: '<strong>Click riga</strong> apre dettaglio con tutti i campi anagrafici + figli collegati + iscrizioni + log eventi + CTA «Modifica come admin».' }
    ]
  });
  setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 50);
</script>
