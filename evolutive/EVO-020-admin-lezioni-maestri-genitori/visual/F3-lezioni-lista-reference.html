<script>
  mountMockup({
    crumb: ['Mockup Portale', 'Admin', 'Lezioni'],
    title: 'Lezioni · storico globale admin',
    route: '/portale/admin/lezioni',
    statusBarTheme: 'dark',
    desktopScale: 0.58,
    stateLegend: { tag: 'Stato', items: [{ ref: 1, text: 'Filtro maggio 2026 · 6 lezioni miste (4 MTB + 1 BDC + 1 JR sabato) · 2 con note interne (icona ember)' }] },
    annotations: [
      { ref: 1, text: '<strong>KPI dashboard mese</strong>: lezioni totali + presenze + media + maestro più attivo. Quest\'ultimo dato è prezioso per pagamento maestri.' },
      { ref: 2, text: '<strong>Tabella stile compact</strong> con disciplina come badge (MTB grass / BDC sky / JR ember). Permette filter visivo veloce.' },
      { ref: 3, text: '<strong>Argomento bold</strong>: il dato più importante per riconoscere la lezione a colpo d\'occhio. Replicato dal pattern maestro.' },
      { ref: 4, text: '<strong>Avatar stack maestri</strong>: pattern condiviso con gare-assegnate. Co-maestri mostrati con nome inline mono.' },
      { ref: 5, text: '<strong>Presenze pillola navy</strong>: numero centrato. Click apre dettaglio con lista nominativa bambini presenti.' },
      { ref: 6, text: '<strong>Note pubbliche vs interne</strong>: 2 colonne icone check colorate. Grass = note pubbliche presenti, ember = note interne presenti, em-dash = vuoto. L\'admin vede entrambe.' },
      { ref: 7, text: '<strong>JR rule</strong>: lezione sabato 04 mag classificata «JR» (giovaniss. 5-7 anni) — corso separato dai MTB/BDC ufficiali. Pattern già esposto in dashboard admin corsi attivi.' },
      { ref: 8, text: '<strong>Eye action</strong>: apre vista read-only della lezione con tutti i campi + audit log modifiche. Admin può eliminare (UX_DETTAGLIO_MAESTRO §2 — solo admin pu\u00f2 eliminare).' }
    ]
  });
  setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 50);
