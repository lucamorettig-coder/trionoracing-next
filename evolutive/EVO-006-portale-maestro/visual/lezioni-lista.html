<style>
.page-head { display: flex; flex-direction: column; gap: 14px; margin-bottom: 22px; }
.page-head-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.page-h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 6px; }
.page-sub { font-size: 14px; color: var(--ink-muted); margin: 0; }

.filters-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.f-select {
  display: inline-flex; align-items: center; gap: 6px;
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 8px 12px;
  font-size: 13px; font-weight: 500; color: var(--ink); cursor: pointer;
  font-family: inherit;
}
.f-select.active { border-color: var(--navy-700); background: var(--navy-50); }
.f-select .label { color: var(--ink-muted); font-size: 11.5px; }
.f-select .value { font-weight: 600; }

.month-h {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 14px; margin: 28px 0 14px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--line);
}
.month-h .title {
  font-family: var(--f-mono);
  font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--navy-700);
  font-weight: 700;
}
.month-h .stats {
  font-family: var(--f-mono);
  font-size: 11px; color: var(--ink-muted);
  letter-spacing: 0.04em;
}

.lez-card {
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 16px; margin-bottom: 10px;
  display: flex; gap: 14px;
  text-decoration: none; color: inherit;
  box-shadow: var(--sh-xs);
  transition: all .18s;
}
.lez-card:hover { box-shadow: var(--sh-sm); border-color: var(--navy-200); }

.lez-date-tile {
  width: 64px; flex-shrink: 0; text-align: center;
  background: var(--bg-soft); border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 10px 6px;
}
.lez-date-tile .day { font-size: 22px; font-weight: 800; color: var(--navy-700); line-height: 1; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.lez-date-tile .dow {
  font-size: 9px; font-family: var(--f-mono);
  text-transform: uppercase; color: var(--ink-muted);
  margin-top: 4px; font-weight: 700; letter-spacing: 0.06em;
}
.lez-date-tile.mtb { background: var(--grass-50); border-color: var(--grass-100); }
.lez-date-tile.mtb .day { color: var(--grass-700); }
.lez-date-tile.bdc { background: var(--sky-50); border-color: var(--sky-100); }
.lez-date-tile.bdc .day { color: var(--sky-700); }

.lez-body { flex: 1; min-width: 0; }
.lez-top { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.lez-arg { font-size: 16px; font-weight: 700; color: var(--ink); margin: 0; line-height: 1.25; letter-spacing: -0.005em; }
.lez-time { font-size: 12px; color: var(--ink-muted); font-family: var(--f-mono); flex-shrink: 0; }
.lez-meta {
  font-size: 12.5px; color: var(--ink-muted);
  margin-top: 4px;
  display: flex; gap: 4px 10px; flex-wrap: wrap; align-items: center;
}
.lez-meta .ico { display: inline-flex; align-items: center; gap: 4px; }
.lez-pubnotes {
  font-size: 13px; color: var(--ink);
  margin-top: 10px;
  padding: 10px 12px;
  background: var(--bg-soft);
  border-radius: var(--r-md);
  border-left: 3px solid var(--sun-500);
  line-height: 1.45;
}
.lez-pubnotes-label {
  font-family: var(--f-mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--ink-muted); margin-bottom: 3px;
}
.lez-foot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 10px;
  gap: 10px; flex-wrap: wrap;
}
.lez-foot-presenze {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; color: var(--ink);
}
.lez-foot-presenze .num {
  background: var(--navy-700); color: #fff;
  font-weight: 700; font-size: 12px;
  padding: 1px 8px; border-radius: 999px;
  font-variant-numeric: tabular-nums;
}
.lez-foot-action {
  font-size: 13px; font-weight: 600;
  color: var(--sky-600); text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px;
}

@container page (min-width: 900px) {
  .page-head { flex-direction: row; align-items: flex-end; justify-content: space-between; }
  .page-h1 { font-size: 32px; }
  .lez-card { padding: 22px; gap: 18px; }
  .lez-date-tile { width: 80px; padding: 14px 8px; }
  .lez-date-tile .day { font-size: 28px; }
  .lez-arg { font-size: 18px; }
}
</style>

<script>
  mountMockup({

    route: '/portale/lezioni',
    statusBarTheme: 'dark',

    stateLegend: { tag: 'Stato', items: [{ ref: 1, text: 'Storico 2 mesi · 7 card visibili · ultima oltre 30gg in sola lettura' }] },
    annotations: [
      { ref: 1, text: '<strong>Group by month</strong>: divider con titolo mono + stats laterali (totale presenze + media). Pattern condiviso con gare-lista e diario lezioni.' },
      { ref: 2, text: '<strong>Date tile colorato per disciplina</strong>: grass (MTB · giovedì) / sky (BDC · martedì). Letterng DOW (giorno settimana) in mono uppercase. Riprende le 2 sezioni del wizard iscrizione.' },

      { ref: 4, text: '<strong>Note pubbliche</strong>: callout sun-bordered se presenti. Mostrate in lista per dare immediato senso del contenuto al maestro. Sostituiscono lo \u00ablorem ipsum diario\u00bb dell\'As-Is.' },
      { ref: 5, text: '<strong>Conteggio presenze</strong>: pillola navy con numero grande. Visivamente il dato più importante in lista (oltre l\'argomento). Tap apre dettaglio.' },
      { ref: 6, text: '<strong>Lezione oltre 30gg</strong> (ultima card): opacity ridotta + badge inline «solo admin modifica» con icona lock + CTA muted «Sola lettura». Da decisione UX §1.' },
      { ref: 7, text: '<strong>Co-maestri inline</strong>: «tu + Marta» / «solo tu». Le lezioni di Marta in cui tu sei tagged compaiono anche qui.' },
      { ref: 8, text: '<strong>Filtri</strong>: anno + disciplina + filtro mio/co-maestri. Niente filtro mese: la lista è già groupata per mese.' }
    ]
  });
  setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 50);
</script>
