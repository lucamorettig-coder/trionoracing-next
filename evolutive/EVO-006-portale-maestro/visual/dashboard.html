<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* HERO maestro */
.m-hero {
  background: var(--navy-900); color: #fff;
  position: relative; overflow: hidden;
}
.m-hero-pattern {
  position: absolute; inset: 0;
  background-image: url('../assets/pattern.svg');
  background-size: 220px 220px; background-repeat: repeat;
  opacity: 0.55;
}
.m-hero-pattern::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(5,14,63,0) 0%, rgba(5,14,63,0.55) 60%, rgba(5,14,63,0.95) 100%);
}
.m-hero-inner { position: relative; z-index: 1; padding: 24px 16px 28px; }
.m-hero-eyebrow {
  font-family: var(--f-mono); font-size: 11px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--sun-500);
  display: inline-flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.m-hero-h {
  font-size: 28px; font-weight: 700; letter-spacing: -0.02em;
  line-height: 1.05; margin: 0 0 12px;
}
.m-hero-sub {
  font-size: 15px; color: rgba(255,255,255,.75);
  margin: 0; line-height: 1.5; max-width: 520px;
}
.m-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 18px; }
.m-stat {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.14);
  border-radius: var(--r-md);
  padding: 10px 12px;
}
.m-stat .v { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.01em; line-height: 1; }
.m-stat .l { font-size: 10.5px; font-family: var(--f-mono); text-transform: uppercase; letter-spacing: 0.04em; color: rgba(255,255,255,.55); margin-top: 4px; }

/* Oggi card */
.today-card {
  background: linear-gradient(135deg, var(--sun-500), #FFCD2C);
  border-radius: var(--r-xl);
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  overflow: hidden;
}
.today-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url('../assets/pattern.svg');
  background-size: 160px 160px;
  opacity: 0.1;
}
.today-card > * { position: relative; z-index: 1; }
.today-icon {
  width: 52px; height: 52px;
  background: var(--navy-900); color: var(--sun-500);
  border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.today-body { flex: 1; min-width: 0; }
.today-title { font-size: 17px; font-weight: 700; color: var(--navy-900); margin: 0; line-height: 1.2; letter-spacing: -0.015em; }
.today-sub { font-size: 13px; color: var(--navy-900); opacity: 0.75; margin-top: 3px; }

/* Lezione row in storico */
.lez-row {
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 14px;
  display: flex; gap: 14px;
  align-items: flex-start;
  margin-bottom: 8px;
  text-decoration: none; color: inherit;
}
.lez-row:hover { border-color: var(--navy-200); box-shadow: var(--sh-xs); }
.lez-date {
  text-align: center;
  width: 48px;
  flex-shrink: 0;
  border-right: 1px solid var(--line-soft);
  padding-right: 12px;
}
.lez-date .d { font-size: 18px; font-weight: 700; color: var(--navy-700); line-height: 1; }
.lez-date .m { font-size: 10px; font-family: var(--f-mono); text-transform: uppercase; color: var(--ink-muted); margin-top: 3px; }
.lez-body { flex: 1; min-width: 0; }
.lez-arg { font-size: 14px; font-weight: 700; color: var(--ink); letter-spacing: -0.005em; line-height: 1.25; }
.lez-meta { font-size: 12.5px; color: var(--ink-muted); margin-top: 3px; display: flex; gap: 4px 10px; flex-wrap: wrap; align-items: center; }
.lez-meta .ico { display: inline-flex; align-items: center; gap: 4px; }

/* Gara assegnata row */
.gara-row {
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 14px;
  margin-bottom: 8px;
  display: flex; align-items: flex-start; gap: 12px;
  text-decoration: none; color: inherit;
}
.gara-row:hover { border-color: var(--navy-200); box-shadow: var(--sh-xs); }
.gara-row .date-tile {
  background: var(--bg-soft); border: 1px solid var(--line);
  border-radius: 8px;
  width: 48px; padding: 8px 4px;
  text-align: center;
  flex-shrink: 0;
}
.gara-row .date-tile.featured { background: var(--sun-500); border-color: var(--sun-500); }
.gara-row .date-tile .d { font-size: 18px; font-weight: 800; color: var(--navy-700); line-height: 1; }
.gara-row .date-tile.featured .d { color: var(--navy-900); }
.gara-row .date-tile .m { font-size: 9.5px; font-family: var(--f-mono); text-transform: uppercase; color: var(--ink-muted); margin-top: 3px; font-weight: 700; }
.gara-row .body { flex: 1; min-width: 0; }
.gara-row .title { font-size: 14px; font-weight: 700; color: var(--ink); }
.gara-row .meta { font-size: 12px; color: var(--ink-muted); margin-top: 2px; display: flex; gap: 4px 10px; flex-wrap: wrap; }

/* Quick actions */
.qa-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
.qa-card {
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 16px;
  display: flex; align-items: center; gap: 14px;
  text-decoration: none; color: var(--ink);
  transition: all .18s;
}
.qa-card:hover { border-color: var(--navy-700); box-shadow: var(--sh-sm); }
.qa-card-icon {
  width: 44px; height: 44px;
  background: var(--navy-700); color: #fff;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.qa-card.primary .qa-card-icon { background: var(--sun-500); color: var(--navy-900); }
.qa-card-body { flex: 1; min-width: 0; }
.qa-card-title { font-size: 14.5px; font-weight: 700; line-height: 1.2; }
.qa-card-sub { font-size: 12.5px; color: var(--ink-muted); margin-top: 2px; }

@container page (min-width: 900px) {
  .m-hero-inner { padding: 56px 40px 64px; }
  .m-hero-h { font-size: 44px; letter-spacing: -0.025em; }
  .m-hero-sub { font-size: 17px; }
  .m-stats { grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 28px; max-width: 720px; }
  .m-stat { padding: 18px 20px; border-radius: var(--r-lg); }
  .m-stat .v { font-size: 30px; }
  .today-card { padding: 24px 28px; }
  .today-icon { width: 64px; height: 64px; }
  .today-title { font-size: 22px; }
  .qa-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .dash-cols { display: grid; grid-template-columns: 1fr 360px; gap: 28px; }
}
.dash-cols { display: block; }
</style>
</head>

<script>
  mountMockup({
    crumb: ['Mockup Portale', 'Maestro', 'Dashboard'],
    title: 'Dashboard Maestro',
    route: '/portale',
    statusBarTheme: 'dark',
    desktopScale: 0.58,
    stateLegend: { tag: 'Stato', items: [{ ref: 1, text: 'Maestro Andrea Mancini · 8 lezioni maggio · lezione MTB oggi 17:00 · 2 gare assegnate' }] },
    annotations: [
      { ref: 1, text: '<strong>Hero maestro</strong>: stessa DNA della dashboard genitore ma con eyebrow «Maestro · MTB + BDC» (multi-discipline supportato, vedi UX_DETTAGLIO_MAESTRO scope decisions §3). Stat: lezioni/presenze/gare/bambini attivi.' },

      { ref: 6, text: '<strong>NavBar maestro</strong>: 4 voci semplici (Home · Le mie lezioni · Gare assegnate · Profilo). Avatar ember (vs navy genitore, sun admin) per signal cromatico veloce del ruolo loggato.' },

    ]
  });
  setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 50);
</script>
