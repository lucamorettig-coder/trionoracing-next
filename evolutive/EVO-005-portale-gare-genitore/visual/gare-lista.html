<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calendario gare · Portale Triono Racing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
.page-h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 6px; }
.page-sub { font-size: 14px; color: var(--ink-muted); margin: 0; max-width: 540px; }

/* ===== FILTRI ===== */
.gare-filters {
  display: flex; flex-wrap: wrap; gap: 8px;
  align-items: center;
  margin-top: 18px;
}
.f-select {
  display: inline-flex; align-items: center; gap: 6px;
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 8px 12px;
  font-size: 13px; font-weight: 500;
  color: var(--ink); cursor: pointer;
  font-family: inherit;
}
.f-select:hover { border-color: var(--navy-300); }
.f-select.active { border-color: var(--navy-700); background: var(--navy-50); }
.f-select .label { color: var(--ink-muted); font-size: 11.5px; }
.f-select .value { font-weight: 600; }
.f-select .clear {
  width: 16px; height: 16px;
  margin-left: 2px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--navy-700); color: #fff;
}

.f-toggle {
  display: inline-flex; align-items: center; gap: 8px;
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 8px 12px;
  font-size: 13px; font-weight: 500;
  color: var(--ink); cursor: pointer;
  font-family: inherit;
}
.f-toggle input { width: 14px; height: 14px; accent-color: var(--navy-700); margin: 0; cursor: pointer; }
.f-toggle.on { border-color: var(--grass-500); background: var(--grass-50); color: var(--grass-700); font-weight: 600; }

.f-clear-all {
  font-size: 12.5px; font-weight: 600;
  color: var(--sky-600);
  text-decoration: none;
  margin-left: 4px;
  cursor: pointer;
}
.f-clear-all:hover { color: var(--navy-700); }
.f-results-count {
  font-family: var(--f-mono);
  font-size: 11.5px;
  color: var(--ink-muted);
  letter-spacing: 0.04em;
  margin-left: auto;
}

.month-h {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin: 32px 0 14px;
  display: flex; align-items: center; gap: 10px;
}
.month-h::after { content: ''; flex: 1; height: 1px; background: var(--line); }

/* gara card */
.gara-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 18px;
  margin-bottom: 12px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  text-decoration: none;
  color: inherit;
  box-shadow: var(--sh-xs);
  transition: all .2s;
  position: relative;
}
.gara-card:hover { box-shadow: var(--sh-md); border-color: var(--navy-200); }
.gara-date {
  width: 64px;
  flex-shrink: 0;
  text-align: center;
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 10px 6px;
  line-height: 1.1;
}
.gara-date .day {
  font-size: 24px;
  font-weight: 800;
  color: var(--navy-700);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.gara-date .mon {
  font-size: 11px;
  font-family: var(--f-mono);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-muted);
  margin-top: 2px;
  font-weight: 700;
}
.gara-card.featured .gara-date { background: var(--sun-500); border-color: var(--sun-500); }
.gara-card.featured .gara-date .day { color: var(--navy-900); }
.gara-card.featured .gara-date .mon { color: var(--navy-900); opacity: 0.7; }

.gara-body { flex: 1; min-width: 0; }
.gara-title-row { display: flex; gap: 10px; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; }
.gara-title { font-size: 16px; font-weight: 700; color: var(--ink); margin: 0; line-height: 1.25; letter-spacing: -0.005em; }
.gara-meta {
  font-size: 12.5px; color: var(--ink-muted);
  margin-top: 4px;
  display: flex; gap: 4px 10px; flex-wrap: wrap;
}
.gara-meta .ico { display: inline-flex; align-items: center; gap: 4px; }
.gara-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.gara-foot-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.gara-foot-action {
  font-size: 13px; font-weight: 600;
  color: var(--navy-700);
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px;
  white-space: nowrap;
}

.h-spotlight {
  background: linear-gradient(135deg, var(--sun-500), #FFCD2C);
  border-radius: var(--r-2xl);
  padding: 24px;
  margin-bottom: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: stretch;
  position: relative;
  overflow: hidden;
}
.h-spotlight-top { display: flex; gap: 16px; align-items: flex-start; }
.h-spotlight-top .gara-date { flex-shrink: 0; }
.h-spotlight .cta { align-self: flex-start; }
.h-spotlight-pattern {
  position: absolute; inset: 0;
  background-image: url('../assets/pattern.svg');
  background-size: 180px 180px;
  opacity: 0.08;
}
.h-spotlight > * { position: relative; z-index: 1; }
.h-spotlight-body { flex: 1; min-width: 0; }
.h-spotlight-eyebrow {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--navy-900);
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px;
}
.h-spotlight-title { font-size: 22px; font-weight: 800; color: var(--navy-900); margin: 0 0 6px; letter-spacing: -0.015em; line-height: 1.15; }
.h-spotlight-sub { font-size: 14px; color: var(--navy-900); opacity: 0.7; margin: 0 0 14px; }
.h-spotlight-meta { font-family: var(--f-mono); font-size: 11.5px; color: var(--navy-900); opacity: 0.8; }

@container page (min-width: 720px) {
  .h-spotlight { flex-direction: row; align-items: center; gap: 20px; }
  .h-spotlight-top { flex-direction: row; gap: 20px; flex: 1; align-items: center; }
  .h-spotlight .cta { align-self: center; }
}

@container page (min-width: 900px) {
  .page-h1 { font-size: 32px; }
  .gara-card { padding: 22px; gap: 20px; }
  .gara-date { width: 84px; padding: 14px 8px; }
  .gara-date .day { font-size: 32px; }
  .gara-title { font-size: 18px; }
  .h-spotlight { padding: 32px 36px; }
  .h-spotlight-title { font-size: 28px; }
}
</style>
</head>

<script>
  mountMockup({
    crumb: ['Mockup Portale', 'Genitore', 'Calendario gare'],
    title: 'Calendario gare',
    route: '/portale/gare',
    statusBarTheme: 'dark',
    desktopScale: 0.6,
    stateLegend: { tag: 'Stato', items: [{ ref: 1, text: 'Lista gare 3 mesi · 1 in evidenza scuola · stati misti (confermata, richiesta, non iscritto, futura)' }] },
    annotations: [
      { ref: 1, text: '<strong>Card spotlight in alto</strong>: gara scuola Triono in evidenza con background sun + pattern. Numero gara grande in tile navy invertito. CTA top-right.' },
      { ref: 2, text: '<strong>Filtri</strong>: 3 pillole dropdown (Mese, Regione, Tipologia MTB/BDC/Misto) + toggle «Solo compatibili con i miei figli» (filtra per categoria FCI corrente). Le pillole attive sono navy-50 con icon X per rimuovere il filtro singolo. Link «Pulisci filtri» sky a destra. Counter «4 di 8 gare» in mono a far right.' },
      { ref: 3, text: '<strong>Group by month</strong>: divider mono con count gare. Quando il filtro «Mese» è attivo, mostra solo un gruppo. Pattern usato anche in diario lezioni.' },
      { ref: 3, text: '<strong>Date tile</strong>: 64-84px quadrata con day + mon mono. Variante sun per featured / variante navy per spotlight. Numero giorno è leggibile fino a viewport piccolo.' },
      { ref: 4, text: '<strong>Stato gara per-figlio</strong> nelle pillole sotto: pattern «{nome} · {stato}» per ogni figlio del genitore (confermata grass, richiesta ember, non iscritta neutral, categoria non compatibile neutral con info icon).' },
      { ref: 5, text: '<strong>CTA dinamica</strong>: «Iscrivi i tuoi figli» (gara aperta, nessuna richiesta), «Vedi gara» (richiesta esistente), «Solo informativa» / muted (categoria non compatibile o iscrizioni chiuse).' },
      { ref: 6, text: '<strong>Empty state</strong> (non mostrato): «Nessuna gara in calendario per i prossimi 3 mesi» + link a archivio gare passate.' }
    ]
  });
  setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 50);
</script>
