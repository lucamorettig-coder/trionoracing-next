<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Trofeo Le Grazie · Portale Triono Racing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
.gara-hero {
  background: var(--navy-900);
  color: #fff;
  position: relative;
  overflow: hidden;
  padding: 28px 16px 32px;
}
.gara-hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image: url('../assets/pattern.svg');
  background-size: 220px 220px; background-repeat: repeat;
  opacity: 0.5;
}
.gara-hero::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(5,14,63,0.3) 0%, rgba(5,14,63,0.92) 70%);
}
.gara-hero > * { position: relative; z-index: 1; }
.gara-back {
  display: inline-flex; align-items: center; gap: 6px;
  color: rgba(255,255,255,.7);
  font-size: 13px; text-decoration: none;
  margin-bottom: 14px;
}
.gara-hero-eyebrow {
  font-family: var(--f-mono); font-size: 11px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--sun-500);
  display: inline-flex; align-items: center; gap: 6px;
}
.gara-hero-title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 6px 0 4px; line-height: 1.1; }
.gara-hero-sub { font-size: 14.5px; color: rgba(255,255,255,.75); max-width: 540px; margin: 0; line-height: 1.55; }
.gara-hero-stats {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 22px;
}
.gara-hero-stat {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.14);
  border-radius: var(--r-md);
  padding: 10px 12px;
}
.gara-hero-stat .l { font-size: 10.5px; font-family: var(--f-mono); text-transform: uppercase; letter-spacing: 0.04em; color: rgba(255,255,255,.55); }
.gara-hero-stat .v { font-size: 16px; font-weight: 700; color: #fff; margin-top: 4px; }

/* main content layout */
.gara-layout {
  padding: 20px 16px 40px;
  display: grid; gap: 16px;
  grid-template-columns: 1fr;
}
@container page (min-width: 900px) {
  .gara-layout { grid-template-columns: 1fr 380px; padding: 32px 40px; gap: 32px; max-width: 1240px; margin: 0 auto; }
}

.gara-section {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 20px;
  box-shadow: var(--sh-sm);
}
.gara-section h2 {
  font-size: 16px;
  font-weight: 700;
  margin: 0 0 10px;
  letter-spacing: -0.005em;
}
.gara-section p {
  font-size: 14px; line-height: 1.6; color: var(--ink); margin: 0 0 10px;
}
.gara-section p.muted { color: var(--ink-muted); }

.kv-row { display: flex; gap: 8px; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--line-soft); }
.kv-row:last-child { border-bottom: none; }
.kv-row .k {
  width: 110px; flex-shrink: 0;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.kv-row .v { flex: 1; font-size: 14px; color: var(--ink); font-weight: 500; }

.cat-list { display: flex; flex-wrap: wrap; gap: 6px; }

.figli-pick-row {
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: var(--r-md);
  padding: 12px 14px;
  margin-bottom: 10px;
  display: flex; gap: 12px; align-items: center;
  cursor: pointer;
  position: relative;
}
.figli-pick-row.selected { border-color: var(--navy-700); background: var(--navy-50); }
.figli-pick-row.disabled { opacity: 0.5; cursor: not-allowed; }
.figli-pick-row .photo { width: 38px; height: 38px; border-radius: 8px; flex-shrink: 0; }
.figli-pick-row .body { flex: 1; min-width: 0; }
.figli-pick-row .nm { font-size: 14px; font-weight: 600; color: var(--ink); }
.figli-pick-row .sub { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
.figli-pick-row .chk {
  width: 20px; height: 20px;
  border: 2px solid var(--line);
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.figli-pick-row.selected .chk { background: var(--navy-700); border-color: var(--navy-700); color: #fff; }

.gara-aside {
  position: relative;
}
@container page (min-width: 900px) { .gara-aside { position: sticky; top: 24px; } }

@container page (min-width: 900px) {
  .gara-hero { padding: 56px 40px 56px; }
  .gara-hero-title { font-size: 42px; letter-spacing: -0.025em; }
  .gara-hero-stats { grid-template-columns: repeat(4, 1fr); max-width: 680px; }
}
</style>
</head>
<body>

<div id="mount"></div>

<template id="page-content">
<div class="page" style="background:var(--bg-soft)">

  <header class="navbar">
    <div class="nav-inner">
      <a href="#" class="nav-logo" style="text-decoration:none;color:inherit">
        <div class="nav-logo-mark">T</div>
        <div><div class="nav-logo-text">Triono Racing</div><div class="nav-logo-sub">Portale</div></div>
      </a>
      <nav class="nav-links">
        <a href="#" class="nav-link">Home</a>
        <a href="#" class="nav-link">I miei figli</a>
        <a href="#" class="nav-link">Iscrizioni</a>
        <a href="#" class="nav-link active">Gare</a>
        <a href="#" class="nav-link">Profilo</a>
      </nav>
      <div class="nav-actions">
        <button class="nav-iconbtn"><i data-lucide="bell" style="width:18px;height:18px"></i></button>
        <button class="nav-iconbtn nav-iconbtn-burger"><i data-lucide="menu" style="width:20px;height:20px"></i></button>
        <a href="#" style="text-decoration:none;display:inline-flex"><span class="avatar avatar-sm avatar-navy">LR</span></a>
      </div>
    </div>
  </header>

  <div class="breadcrumb">
    <a href="#">Home</a><span class="sep">/</span>
    <a href="gare-lista.html">Calendario gare</a><span class="sep">/</span>
    <span class="current">Trofeo Le Grazie</span>
  </div>

  <!-- HERO -->
  <div class="gara-hero">
    <a href="gare-lista.html" class="gara-back">
      <i data-lucide="arrow-left" style="width:14px;height:14px"></i>
      Calendario gare
    </a>

    <div class="gara-hero-eyebrow">
      <i data-lucide="star" style="width:14px;height:14px"></i>
      In evidenza · gara scuola
    </div>
    <h1 class="gara-hero-title">Trofeo Le Grazie 2026</h1>
    <p class="gara-hero-sub">La gara di casa Triono Racing: 30 km tecnici nel Parco Le Grazie, premiazioni al campo gara e pasta party finale per tutti.</p>

    <div class="gara-hero-stats">
      <div class="gara-hero-stat">
        <div class="l">Quando</div>
        <div class="v">DOM 14 GIU · 09:00</div>
      </div>
      <div class="gara-hero-stat">
        <div class="l">Dove</div>
        <div class="v">Parco Le Grazie · Terni</div>
      </div>
      <div class="gara-hero-stat">
        <div class="l">Categorie</div>
        <div class="v">G3 → G6 · Giovaniss.</div>
      </div>
      <div class="gara-hero-stat">
        <div class="l">Iscrizioni chiudono</div>
        <div class="v" style="color:var(--ember-500)">10 GIU · -23 giorni</div>
      </div>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="gara-layout">

    <!-- LEFT -->
    <div>
      <div class="gara-section">
        <h2>Descrizione della gara</h2>
        <p>Il Trofeo Le Grazie è la gara ufficiale di stagione di Triono Racing. Il tracciato attraversa 30 km del Parco Le Grazie su sterrato misto e single-track tecnici adatti dalle G3 alle G6.</p>
        <p>La giornata inizia alle 09:00 con il ritrovo al campo gara, briefing tecnico per le categorie alle 09:30 e partenze scaglionate dalle 10:00. Premiazioni alle 13:00 seguite da pasta party per tutti i partecipanti e famiglie.</p>
        <p class="muted">Il regolamento completo è scaricabile in PDF dalla colonna a destra. La quota di iscrizione gara è di 12 €, da pagare in loco al check-in.</p>
      </div>

      <div class="gara-section" style="margin-top:14px">
        <h2>Informazioni pratiche</h2>
        <div class="kv-row"><div class="k">Organizz.</div><div class="v">ASD CIEMME · Triono Racing</div></div>
        <div class="kv-row"><div class="k">Tipologia</div><div class="v">MTB · Cross-country (XCO)</div></div>
        <div class="kv-row"><div class="k">Distanza</div><div class="v">30 km · 600 m D+ · 3 giri da 10 km</div></div>
        <div class="kv-row"><div class="k">Quota</div><div class="v">12 € · da pagare al check-in in contanti</div></div>
        <div class="kv-row"><div class="k">Premi</div><div class="v">Coppe ai primi 3 di ogni categoria · medaglie a tutti</div></div>
        <div class="kv-row"><div class="k">Maestri</div><div class="v">Andrea Mancini + Marta Conti (assistenza scuola)</div></div>
      </div>

      <div class="gara-section" style="margin-top:14px;display:flex;gap:14px;align-items:flex-start">
        <div style="width:48px;height:48px;background:var(--flag-100);color:var(--flag-700);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i data-lucide="file-text" style="width:22px;height:22px"></i>
        </div>
        <div style="flex:1">
          <div style="font-size:14.5px;font-weight:600">Regolamento ufficiale 2026.pdf</div>
          <div style="font-size:12.5px;color:var(--ink-muted);margin-top:2px">12 pagine · 480 KB · aggiornato 10 mag 2026</div>
        </div>
        <a href="#" class="btn btn-outline btn-sm">
          <i data-lucide="download" style="width:14px;height:14px"></i>
          Scarica
        </a>
      </div>
    </div>

    <!-- RIGHT: iscrizione -->
    <aside class="gara-aside">
      <div class="gara-section" style="border-color:var(--navy-700);border-width:2px;padding:19px">
        <h2 style="display:flex;align-items:center;gap:8px">
          <span style="width:24px;height:24px;background:var(--navy-700);color:#fff;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-family:var(--f-mono);font-weight:700">1</span>
          Iscrivi i tuoi figli
        </h2>
        <p style="font-size:13px;color:var(--ink-muted);margin:0 0 14px;line-height:1.5">Seleziona i figli da iscrivere alla gara. La richiesta verrà valutata dalla segreteria entro 48h.</p>

        <!-- Marco: già richiesto -->
        <div class="figli-pick-row disabled" style="opacity:1;border-color:var(--ember-100);background:var(--ember-50);cursor:default">
          <div class="photo photo-ph" style="font-size:8px">FOTO<br>MARCO</div>
          <div class="body">
            <div class="nm">Marco Rossi</div>
            <div class="sub" style="color:var(--ember-700);font-weight:600">Richiesta inviata · in attesa</div>
          </div>
          <i data-lucide="clock" style="width:18px;height:18px;color:var(--ember-700);flex-shrink:0"></i>
        </div>

        <!-- Giulia: selezionabile -->
        <label class="figli-pick-row selected">
          <div class="photo photo-ph" style="font-size:8px">FOTO<br>GIULIA</div>
          <div class="body">
            <div class="nm">Giulia Rossi</div>
            <div class="sub">G3 · cat. compatibile · cert. valido</div>
          </div>
          <div class="chk">
            <i data-lucide="check" style="width:13px;height:13px"></i>
          </div>
        </label>

        <button class="btn btn-primary btn-block" style="margin-top:14px">
          Richiedi iscrizione per Giulia
          <i data-lucide="arrow-right" style="width:16px;height:16px"></i>
        </button>

        <p class="helper" style="margin-top:12px">La quota gara di 12 € verrà pagata al check-in il giorno della gara.</p>
      </div>

      <!-- Stato post-richiesta info -->
      <div class="gara-section" style="margin-top:14px">
        <h2 style="font-size:14px">Cosa succede dopo</h2>
        <div style="font-size:13px;color:var(--ink);line-height:1.6">
          <div style="display:flex;gap:10px;margin-bottom:10px;align-items:flex-start">
            <span style="width:20px;height:20px;background:var(--bg-muted);color:var(--ink-muted);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:11px;font-weight:700">1</span>
            <span>Ricevi un'email di conferma richiesta inviata.</span>
          </div>
          <div style="display:flex;gap:10px;margin-bottom:10px;align-items:flex-start">
            <span style="width:20px;height:20px;background:var(--bg-muted);color:var(--ink-muted);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:11px;font-weight:700">2</span>
            <span>La segreteria approva (o rifiuta con motivazione) entro 48h.</span>
          </div>
          <div style="display:flex;gap:10px;align-items:flex-start">
            <span style="width:20px;height:20px;background:var(--bg-muted);color:var(--ink-muted);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:11px;font-weight:700">3</span>
            <span>Vedrai lo stato passare a «confermata» nel tab Gare di Giulia.</span>
          </div>
        </div>
      </div>
    </aside>

  </div>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;background:var(--sun-500);color:var(--navy-900);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px">T</div>
          <div><div class="footer-brand-name">Triono Racing</div></div>
        </div>
      </div>
      <div class="footer-col"><div class="footer-col-title">Gare</div><ul><li><a href="#">Calendario</a></li></ul></div>
      <div class="footer-col"><div class="footer-col-title">Supporto</div><ul><li><a href="#">Contatti</a></li></ul></div>
    </div>
    <div class="footer-bottom"><span>ASD CIEMME</span><span>© 2026</span></div>
  </footer>

</div>
</template>

<script src="../shared/page-shell.js"></script>
<script>
  mountMockup({
    crumb: ['Mockup Portale', 'Genitore', 'Dettaglio gara'],
    title: 'Trofeo Le Grazie · dettaglio gara',
    route: '/portale/gare/[id]',
    statusBarTheme: 'dark',
    desktopScale: 0.6,
    stateLegend: { tag: 'Stato', items: [{ ref: 1, text: 'Gara in evidenza · Marco già richiesto (pending) · Giulia selezionabile' }] },
    annotations: [
      { ref: 1, text: '<strong>Hero navy-900 con pattern</strong>: stessa DNA delle altre hero ricche del portale. Eyebrow sun «In evidenza» con stella, 4 hero-stat in-grid (Quando · Dove · Categorie · Scadenza iscrizioni con count down).' },
      { ref: 2, text: '<strong>2-col layout</strong>: contenuto descrittivo a sinistra (descrizione, KV info pratiche, link regolamento PDF), iscrizione a destra in colonna sticky 380px.' },
      { ref: 3, text: '<strong>Card iscrizione</strong> bordata navy come signal "azione principale" della pagina. Lista figli del genitore filtrata per categoria compatibile, con stati: «in attesa» (banner ember per Marco già richiesto, non riselezionabile), «selezionabile» (radio attivo), «non compatibile» (disabled muted con tooltip).' },
      { ref: 4, text: '<strong>CTA dinamica</strong>: il bottone primary cambia testo in base a chi è selezionato — «Richiedi iscrizione per Giulia» (1 figlio) / «Richiedi per Marco e Giulia» (2 figli) / disabled se nessuno selezionato.' },
      { ref: 5, text: '<strong>Card "Cosa succede dopo"</strong>: 3 step timeline mini con cerchi mono. Riduce ansia spiegando il flow di approvazione (request → admin review 48h → confermata).' },
      { ref: 6, text: '<strong>Stato post-richiesta</strong> (per Marco): card row con icona clock ember + testo «Richiesta inviata · in attesa». Una volta che admin approva, diventa verde grass «Confermata · ti aspettiamo!».' },
      { ref: 7, text: '<strong>Regolamento PDF</strong>: card con icona file flag, nome file, metadata mono + CTA scarica outline. Pattern riusato in modulistica iscrizione e tariffe admin.' }
    ]
  });
  setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 50);
</script>

</body>
</html>
